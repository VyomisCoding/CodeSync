spring.application.name=api-gateway
server.port=0

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

codesync.cors.allowed-origins=http://localhost:4200

management.endpoints.web.exposure.include=health,info

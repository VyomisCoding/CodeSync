spring.application.name=api-gateway
server.port=${SERVER_PORT:8080}

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS:true}

spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=project-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://PROJECT-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/projects/**

spring.cloud.gateway.server.webmvc.routes[2].id=file-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://FILE-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/files/**

spring.cloud.gateway.server.webmvc.routes[3].id=collaboration-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://COLLABORATION-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/sessions/**

spring.cloud.gateway.server.webmvc.routes[4].id=auth-service-docs
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/v3/api-docs/auth-service
spring.cloud.gateway.server.webmvc.routes[4].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.server.webmvc.routes[5].id=project-service-docs
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://PROJECT-SERVICE
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/v3/api-docs/project-service
spring.cloud.gateway.server.webmvc.routes[5].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.server.webmvc.routes[6].id=file-service-docs
spring.cloud.gateway.server.webmvc.routes[6].uri=lb://FILE-SERVICE
spring.cloud.gateway.server.webmvc.routes[6].predicates[0]=Path=/v3/api-docs/file-service
spring.cloud.gateway.server.webmvc.routes[6].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.server.webmvc.routes[7].id=collaboration-service-docs
spring.cloud.gateway.server.webmvc.routes[7].uri=lb://COLLABORATION-SERVICE
spring.cloud.gateway.server.webmvc.routes[7].predicates[0]=Path=/v3/api-docs/collaboration-service
spring.cloud.gateway.server.webmvc.routes[7].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.server.webmvc.routes[8].id=version-service
spring.cloud.gateway.server.webmvc.routes[8].uri=lb://VERSION-SERVICE
spring.cloud.gateway.server.webmvc.routes[8].predicates[0]=Path=/versions/**

spring.cloud.gateway.server.webmvc.routes[9].id=version-service-docs
spring.cloud.gateway.server.webmvc.routes[9].uri=lb://VERSION-SERVICE
spring.cloud.gateway.server.webmvc.routes[9].predicates[0]=Path=/v3/api-docs/version-service
spring.cloud.gateway.server.webmvc.routes[9].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.server.webmvc.routes[10].id=comment-service
spring.cloud.gateway.server.webmvc.routes[10].uri=lb://COMMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[10].predicates[0]=Path=/comments/**

spring.cloud.gateway.server.webmvc.routes[11].id=comment-service-docs
spring.cloud.gateway.server.webmvc.routes[11].uri=lb://COMMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[11].predicates[0]=Path=/v3/api-docs/comment-service
spring.cloud.gateway.server.webmvc.routes[11].filters[0]=SetPath=/v3/api-docs

spring.cloud.gateway.server.webmvc.routes[12].id=notification-service
spring.cloud.gateway.server.webmvc.routes[12].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.server.webmvc.routes[12].predicates[0]=Path=/notifications/**

spring.cloud.gateway.server.webmvc.routes[13].id=notification-service-docs
spring.cloud.gateway.server.webmvc.routes[13].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.server.webmvc.routes[13].predicates[0]=Path=/v3/api-docs/notification-service
spring.cloud.gateway.server.webmvc.routes[13].filters[0]=SetPath=/v3/api-docs
spring.cloud.gateway.server.webmvc.routes[14].id=notification-service-websocket
spring.cloud.gateway.server.webmvc.routes[14].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.server.webmvc.routes[14].predicates[0]=Path=/ws-notifications/**

codesync.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.show-actuator=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/v3/api-docs/auth-service
springdoc.swagger-ui.urls[1].name=Project Service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/project-service
springdoc.swagger-ui.urls[2].name=File Service
springdoc.swagger-ui.urls[2].url=/v3/api-docs/file-service
springdoc.swagger-ui.urls[3].name=Collaboration Service
springdoc.swagger-ui.urls[3].url=/v3/api-docs/collaboration-service
springdoc.swagger-ui.urls[4].name=Version Service
springdoc.swagger-ui.urls[4].url=/v3/api-docs/version-service
springdoc.swagger-ui.urls[5].name=Comment Service
springdoc.swagger-ui.urls[5].url=/v3/api-docs/comment-service
springdoc.swagger-ui.urls[6].name=Notification Service
springdoc.swagger-ui.urls[6].url=/v3/api-docs/notification-service

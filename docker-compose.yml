services:
  mysql:
    image: mysql:8.4
    container_name: codesync-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - codesync

  redis:
    image: redis:7.4-alpine
    container_name: codesync-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - codesync

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: codesync-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-codesync}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?Set RABBITMQ_DEFAULT_PASS in .env}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - codesync

  service-registry:
    build:
      context: ./service-registry
      args:
        MAVEN_MIRROR_URL: ${MAVEN_MIRROR_URL:-https://repo.maven.apache.org/maven2}
        MAVEN_BUILD_RETRIES: ${MAVEN_BUILD_RETRIES:-4}
    container_name: codesync-service-registry
    environment:
      SERVER_PORT: 8761
      EUREKA_HOSTNAME: service-registry
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - codesync

  auth-service:
    build:
      context: ./auth-service
      args:
        MAVEN_MIRROR_URL: ${MAVEN_MIRROR_URL:-https://repo.maven.apache.org/maven2}
        MAVEN_BUILD_RETRIES: ${MAVEN_BUILD_RETRIES:-4}
    container_name: codesync-auth-service
    environment:
      SERVER_PORT: 8081
      EUREKA_SERVER_URL: http://service-registry:8761/eureka
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      AUTH_DB_NAME: auth_db
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:3000}
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - codesync

  project-service:
    build:
      context: ./project-service
      args:
        MAVEN_MIRROR_URL: ${MAVEN_MIRROR_URL:-https://repo.maven.apache.org/maven2}
        MAVEN_BUILD_RETRIES: ${MAVEN_BUILD_RETRIES:-4}
    container_name: codesync-project-service
    environment:
      SERVER_PORT: 8082
      EUREKA_SERVER_URL: http://service-registry:8761/eureka
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      PROJECT_DB_NAME: project_db
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:3000}
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - codesync

  file-service:
    build:
      context: ./file-service
      args:
        MAVEN_MIRROR_URL: ${MAVEN_MIRROR_URL:-https://repo.maven.apache.org/maven2}
        MAVEN_BUILD_RETRIES: ${MAVEN_BUILD_RETRIES:-4}
    container_name: codesync-file-service
    environment:
      SERVER_PORT: 8083
      EUREKA_SERVER_URL: http://service-registry:8761/eureka
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      FILE_DB_NAME: file_db
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:3000}
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - codesync

  collaboration-service:
    build:
      context: ./collaboration-service
      args:
        MAVEN_MIRROR_URL: ${MAVEN_MIRROR_URL:-https://repo.maven.apache.org/maven2}
        MAVEN_BUILD_RETRIES: ${MAVEN_BUILD_RETRIES:-4}
    container_name: codesync-collaboration-service
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/collab_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:4200,http://localhost:3000}
      WEBSOCKET_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:4200,http://localhost:3000}
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - codesync

  execution-service:
    build:
      context: ./execution-service
      args:
        MAVEN_MIRROR_URL: ${MAVEN_MIRROR_URL:-https://repo.maven.apache.org/maven2}
        MAVEN_BUILD_RETRIES: ${MAVEN_BUILD_RETRIES:-4}
    container_name: codesync-execution-service
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/execution_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-codesync}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?Set RABBITMQ_DEFAULT_PASS in .env}
      EXECUTION_RABBITMQ_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:4200,http://localhost:3000}
      WEBSOCKET_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:4200,http://localhost:3000}
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8085/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - codesync

  version-service:
    build:
      context: ./version-service
      args:
        MAVEN_MIRROR_URL: ${MAVEN_MIRROR_URL:-https://repo.maven.apache.org/maven2}
        MAVEN_BUILD_RETRIES: ${MAVEN_BUILD_RETRIES:-4}
    container_name: codesync-version-service
    environment:
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/version_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:4200,http://localhost:3000}
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8086/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - codesync

  comment-service:
    build:
      context: ./comment-service
      args:
        MAVEN_MIRROR_URL: ${MAVEN_MIRROR_URL:-https://repo.maven.apache.org/maven2}
        MAVEN_BUILD_RETRIES: ${MAVEN_BUILD_RETRIES:-4}
    container_name: codesync-comment-service
    environment:
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/comment_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:4200,http://localhost:3000}
      COMMENT_REMOTE_VALIDATION_ENABLED: "true"
      COMMENT_MENTION_NOTIFICATIONS_ENABLED: "false"
    ports:
      - "8087:8087"
    depends_on:
      mysql:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8087/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - codesync

  notification-service:
    build:
      context: ./notification-service
      args:
        MAVEN_MIRROR_URL: ${MAVEN_MIRROR_URL:-https://repo.maven.apache.org/maven2}
        MAVEN_BUILD_RETRIES: ${MAVEN_BUILD_RETRIES:-4}
    container_name: codesync-notification-service
    environment:
      SERVER_PORT: 8088
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/notification_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:4200,http://localhost:3000}
      WEBSOCKET_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:4200,http://localhost:3000}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@codesync.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-CodeSync Notifications}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-false}
      MAIL_CONNECTION_TIMEOUT: ${MAIL_CONNECTION_TIMEOUT:-5000}
      MAIL_TIMEOUT: ${MAIL_TIMEOUT:-5000}
      MAIL_WRITE_TIMEOUT: ${MAIL_WRITE_TIMEOUT:-5000}
      NOTIFICATION_AUTH_LOOKUP_ENABLED: "true"
    ports:
      - "8088:8088"
    depends_on:
      mysql:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8088/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - codesync

  api-gateway:
    build:
      context: ./api-gateway
      args:
        MAVEN_MIRROR_URL: ${MAVEN_MIRROR_URL:-https://repo.maven.apache.org/maven2}
        MAVEN_BUILD_RETRIES: ${MAVEN_BUILD_RETRIES:-4}
    container_name: codesync-api-gateway
    environment:
      SERVER_PORT: 8080
      EUREKA_SERVER_URL: http://service-registry:8761/eureka
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      service-registry:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      project-service:
        condition: service_healthy
      file-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - codesync

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:

networks:
  codesync:
    driver: bridge

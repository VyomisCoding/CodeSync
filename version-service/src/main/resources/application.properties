spring.application.name=version-service
server.port=${SERVER_PORT:8086}
server.forward-headers-strategy=framework

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${VERSION_DB_NAME:version_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USERNAME:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:}}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:${EUREKA_SERVER_URL:http://localhost:8761/eureka}}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS:true}

jwt.secret=${JWT_SECRET}

codesync.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:4200,http://localhost:3000}
codesync.version.remote-validation.enabled=${VERSION_REMOTE_VALIDATION_ENABLED:true}

management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info
management.health.discoveryComposite.enabled=${MANAGEMENT_HEALTH_DISCOVERY_ENABLED:false}
management.health.eureka.enabled=${MANAGEMENT_HEALTH_EUREKA_ENABLED:false}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

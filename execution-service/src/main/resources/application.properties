spring.application.name=execution-service
server.port=${SERVER_PORT:8085}
server.forward-headers-strategy=framework

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${EXECUTION_DB_NAME:execution_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USERNAME:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:}}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:${EUREKA_SERVER_URL:http://localhost:8761/eureka}}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS:true}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.missing-queues-fatal=false

jwt.secret=${JWT_SECRET}

codesync.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:4200,http://localhost:3000}
codesync.execution.stomp.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:${codesync.cors.allowed-origins}}
codesync.execution.max-execution-time-ms=${EXECUTION_MAX_TIME_MS:10000}
codesync.execution.max-memory-mb=${EXECUTION_MAX_MEMORY_MB:256}
codesync.execution.remote-validation.enabled=${EXECUTION_REMOTE_VALIDATION_ENABLED:true}
codesync.execution.rabbitmq.enabled=${EXECUTION_RABBITMQ_ENABLED:false}
codesync.execution.rabbitmq.queue-name=${EXECUTION_QUEUE_NAME:execution.jobs}
codesync.execution.async.core-pool-size=${EXECUTION_ASYNC_CORE_POOL_SIZE:2}
codesync.execution.async.max-pool-size=${EXECUTION_ASYNC_MAX_POOL_SIZE:4}

management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info
management.health.rabbit.enabled=${MANAGEMENT_HEALTH_RABBIT_ENABLED:false}
management.health.discoveryComposite.enabled=${MANAGEMENT_HEALTH_DISCOVERY_ENABLED:false}
management.health.eureka.enabled=${MANAGEMENT_HEALTH_EUREKA_ENABLED:false}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

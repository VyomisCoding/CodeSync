spring.datasource.url=jdbc:h2:mem:executiondb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

codesync.execution.rabbitmq.enabled=false
codesync.execution.remote-validation.enabled=false
codesync.execution.max-execution-time-ms=10000
codesync.execution.max-memory-mb=256
codesync.cors.allowed-origins=http://localhost:4200,http://localhost:3000
codesync.execution.stomp.allowed-origins=http://localhost:4200,http://localhost:3000

jwt.secret=supersecurejwtsecretkeythatisatleast32chars

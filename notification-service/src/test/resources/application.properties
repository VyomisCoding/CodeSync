spring.datasource.url=jdbc:h2:mem:notificationdb;MODE=MYSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

jwt.secret=01234567890123456789012345678901

codesync.cors.allowed-origins=http://localhost:8080,http://localhost:4200,http://localhost:3000
codesync.notification.stomp.allowed-origins=http://localhost:8080,http://localhost:4200,http://localhost:3000
codesync.notification.email.from=no-reply@codesync.local
codesync.notification.auth-lookup.enabled=false

spring.mail.host=
management.health.mail.enabled=false
management.health.discoveryComposite.enabled=false
management.health.eureka.enabled=false

spring.application.name=notification-service
server.port=${SERVER_PORT:8088}
server.forward-headers-strategy=framework

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${NOTIFICATION_DB_NAME:notification_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USERNAME:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:}}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:${EUREKA_SERVER_URL:http://localhost:8761/eureka}}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS:true}

jwt.secret=${JWT_SECRET}

codesync.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:4200,http://localhost:3000}
codesync.notification.stomp.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:${codesync.cors.allowed-origins}}
codesync.notification.email.from=${MAIL_FROM:${MAIL_USERNAME:no-reply@codesync.local}}
codesync.notification.email.from-name=${MAIL_FROM_NAME:CodeSync Notifications}
codesync.notification.email.log-preview-length=${NOTIFICATION_EMAIL_LOG_PREVIEW_LENGTH:120}
codesync.notification.auth-lookup.enabled=${NOTIFICATION_AUTH_LOOKUP_ENABLED:true}
codesync.openapi.server-url=${NOTIFICATION_OPENAPI_SERVER_URL:}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT:5000}

management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:false}
management.health.discoveryComposite.enabled=${MANAGEMENT_HEALTH_DISCOVERY_ENABLED:false}
management.health.eureka.enabled=${MANAGEMENT_HEALTH_EUREKA_ENABLED:false}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

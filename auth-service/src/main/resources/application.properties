spring.application.name=auth-service
server.port=${SERVER_PORT:8081}
server.forward-headers-strategy=framework

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${AUTH_DB_NAME:auth_db}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS:true}

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-secret=${JWT_REFRESH_SECRET:${JWT_SECRET}}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

codesync.oauth.github.client-id=${GITHUB_CLIENT_ID:}
codesync.oauth.github.client-secret=${GITHUB_CLIENT_SECRET:}
codesync.oauth.google.client-id=${GOOGLE_CLIENT_ID:}
codesync.oauth.google.client-secret=${GOOGLE_CLIENT_SECRET:}

codesync.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

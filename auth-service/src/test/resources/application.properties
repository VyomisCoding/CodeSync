spring.application.name=auth-service
server.port=0

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

spring.datasource.url=jdbc:h2:mem:auth_db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

jwt.secret=test-jwt-secret-for-codesync-which-is-long-enough
jwt.expiration-ms=3600000
codesync.cors.allowed-origins=http://localhost:4200

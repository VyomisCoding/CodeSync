spring.application.name=collaboration-service
server.port=${SERVER_PORT:8084}
server.forward-headers-strategy=framework

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${COLLAB_DB_NAME:collab_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USERNAME:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:}}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:${EUREKA_SERVER_URL:http://localhost:8761/eureka}}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP_ADDRESS:true}

jwt.secret=${JWT_SECRET}

codesync.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:4200,http://localhost:3000}
codesync.collab.stomp.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:${codesync.cors.allowed-origins}}
codesync.collab.auto-end-minutes=${COLLAB_AUTO_END_MINUTES:30}
codesync.collab.housekeeping-delay-ms=${COLLAB_HOUSEKEEPING_DELAY_MS:60000}
codesync.collab.remote-validation.enabled=${COLLAB_REMOTE_VALIDATION_ENABLED:true}

management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

spring.application.name=collaboration-service
server.port=0

spring.datasource.url=jdbc:h2:mem:collabdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

eureka.client.enabled=false

jwt.secret=MySuperSecretKeyForCodeSyncJwtToken123456789SecureKey

codesync.cors.allowed-origins=http://localhost:8080
codesync.collab.stomp.allowed-origins=http://localhost:8080
codesync.collab.auto-end-minutes=30
codesync.collab.housekeeping-delay-ms=60000

management.endpoints.web.exposure.include=health,info
